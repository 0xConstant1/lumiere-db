services:
  db:
    image: paradedb/paradedb:latest
    container_name: lumiere_postgres
    restart: always
    shm_size: "4gb"
    command:
      - postgres
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - max_parallel_workers=8
      - -c
      - max_parallel_maintenance_workers=4
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
      PGDATA: /var/lib/postgresql/docker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydatabase"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: lumiere_api
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/mydatabase
      IMDB_DATA_DIR: /data
      ENABLE_PG_SEARCH: true
      RUN_ETL: "true"
      ETL_SCHEDULE_ENABLED: "true"
      ETL_POLL_INTERVAL: "1h"
      ETL_BOOTSTRAP_BLOCKING: "true"
      ETL_KEEP_STAGING: "false"
      ETL_LOAD_BATCH_SIZE: "20000"
      ETL_BATCH_SIZE: "20000"
      ETL_DOWNLOAD_CONCURRENCY: "3"
      ETL_MAX_PARALLEL_WORKERS: "6"
      ETL_WORK_MEM: "64MB"
      ETL_MAINTENANCE_WORK_MEM: "1GB"
      ETL_MIN_NUMVOTES: "15"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - imdbdata:/data

volumes:
  pgdata:
  imdbdata:
